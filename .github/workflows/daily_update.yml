name: Daily Stock Update

on:
  workflow_dispatch:
  schedule:
    - cron: "30 22 * * 1-5"

permissions:
  contents: write

concurrency:
  group: daily-stock-update
  cancel-in-progress: false

jobs:
  daily-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run daily data update
        run: python src/daily_update.py

      - name: Retrain models
        run: python src/model_train.py

      - name: Generate predictions
        run: python src/predict.py

      - name: Evaluate predictions
        run: python src/evaluate_predictions.py

      - name: Commit updated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add data/merged_dataset.csv || true
          git add data/predictions_history.csv || true
          git add data/prediction_evaluation.csv || true
          git add data/model_metrics.json || true
          git add data/training_features.json || true
          git add outputs/daily_all_predictions.csv || true
          git add outputs/top_candidates.csv || true
          git add outputs/failed_symbols.csv || true
          git add random_forest_model.pkl || true
          git add random_forest_regressor.pkl || true

          git diff --cached --quiet || git commit -m "Auto daily stock update"
          git push